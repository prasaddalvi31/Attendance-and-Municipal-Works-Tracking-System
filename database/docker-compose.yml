version: '3.8'

services:
  db:
    # This image comes with PostgreSQL and PostGIS pre-installed
    image: postgis/postgis:15-3.3
    container_name: neurax_postgis
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=yourpassword
      - POSTGRES_DB=neurax_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Automatically runs our init script when the container starts for the first time
      - ./init_postgis.sql:/docker-entrypoint-initdb.d/init_postgis.sql

volumes:
  pgdata: